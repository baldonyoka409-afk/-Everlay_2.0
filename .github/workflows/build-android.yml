name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Accept Android SDK licenses (on host)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk unzip
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build APK with Buildozer
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/kivy/buildozer:latest
          options: -v ${{ github.workspace }}:/workspace -w /workspace -v $HOME/android-sdk:/root/.buildozer/android/platform/android-sdk
          run: |
            export PIP_BREAK_SYSTEM_PACKAGES=1
            buildozer -v android debug

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: everlay-apk
          path: bin/*.apk
          retention-days: 30
